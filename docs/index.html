<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Organization Database</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #020617;
      font-size: 24px;
      font-weight: bold;
      border-bottom: 1px solid #1e293b;
    }

    .container {
      padding: 30px;
    }

    h2 {
      margin-top: 30px;
      color: #94a3b8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 15px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.2s;
      text-align: center;
    }

    .card:hover {
      background: #334155;
      transform: scale(1.05);
    }

    .card h3 {
      margin: 10px 0;
    }

    .card p {
      font-size: 14px;
      color: #cbd5f5;
    }
  </style>
</head>

<body>

<header>
  Organization Database
</header>

<div class="container">

  <h2>Specs</h2>
  <div class="grid">
    <div class="card" onclick="location.href='ambassadors.html'">
      <h3>🌍 Ambassadors</h3>
      <p>View duties, council, and laws</p>
    </div>

    <div class="card" onclick="location.href='investigators.html'">
      <h3>🕵️ Investigators</h3>
      <p>Hierarchy, cases, and operations</p>
    </div>
  </div>

  <h2>System</h2>
  <div class="grid">
    <div class="card" onclick="location.href='trials.html'">
      <h3>⚖️ Trials</h3>
      <p>All case documents and records</p>
    </div>

    <div class="card" onclick="location.href='corec.html'">
      <h3>📂 CoRec</h3>
      <p>Coordination & records</p>
    </div>
  </div>

</div>

</body>
</html>
